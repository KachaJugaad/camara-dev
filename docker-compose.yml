version: "3.9"

# CAMARA Canada Sandbox — docker compose up
# Simulation server: http://localhost:8080
# Swagger UI: http://localhost:8080/docs

services:
  simulation:
    build:
      context: .
      dockerfile: src/simulation/Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - ./config:/app/config:ro
      - ./src/simulation/app:/app/src/simulation/app:ro
    environment:
      - CAMARA_ENV=sandbox
      - LOG_LEVEL=info
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  portal-dev:
    build: src/portal/dev
    ports:
      - "3000:3000"
    depends_on:
      - simulation
