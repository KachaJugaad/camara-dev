name: Agent Panel + CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]

# Phase 1: Only Python lint + tests run.
# Rust/Go/TypeScript jobs activate when those directories have real code.
# Agent jobs activate when ANTHROPIC_API_KEY secret is configured.

jobs:
  # ── Lint (Python only in Phase 1) ───────────────────────────────────────────
  lint:
    name: Lint (all layers)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - name: Python lint
        run: |
          pip install black ruff --quiet
          black --check src/simulation/ tests/
          ruff check src/simulation/ tests/

  # ── Python unit tests ───────────────────────────────────────────────────────
  test-python:
    name: Python unit tests
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install -r src/simulation/requirements.txt --quiet
      - run: pytest tests/unit/ -x -q

  # ── QA: CAMARA spec conformance ────────────────────────────────────────────
  qa-conformance:
    name: QA — CAMARA conformance
    needs: test-python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install -r src/simulation/requirements.txt --quiet
      - run: pytest tests/conformance/ -x -q

  # ── Phase 2 gates (skipped until code exists) ──────────────────────────────
  test-rust:
    name: Rust unit tests
    needs: lint
    if: false  # Phase 2 — activate when src/simulation/Cargo.toml exists
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: cd src/simulation && cargo test --all-features

  test-go:
    name: Go unit tests
    needs: lint
    if: false  # Phase 2 — activate when src/api/go.mod exists
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.22' }
      - run: cd src/api && go test ./... -race -count=1

  # ── Agent jobs (require ANTHROPIC_API_KEY secret) ──────────────────────────
  token-watcher-pre:
    name: Token Watcher (pre)
    needs: lint
    if: vars.AGENTS_ENABLED == 'true'
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - run: ./scripts/run-agent.sh token-watcher pre-review

  agent-user-persona:
    name: Agent — User Persona
    needs: lint
    if: vars.AGENTS_ENABLED == 'true'
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - run: ./scripts/run-agent.sh user-persona

  agent-operator-persona:
    name: Agent — Operator Persona
    needs: lint
    if: vars.AGENTS_ENABLED == 'true'
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - run: ./scripts/run-agent.sh operator-persona

  agent-reviewer:
    name: Agent — Reviewer (merge gate)
    needs:
      - qa-conformance
      - agent-user-persona
      - agent-operator-persona
      - token-watcher-pre
    if: vars.AGENTS_ENABLED == 'true'
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 2 }
      - name: Run Reviewer agent
        run: ./scripts/run-agent.sh reviewer
      - name: Check Reviewer approval
        run: |
          approved=$(python3 -c "import json; d=json.load(open('.agent-bus/review.json')); print(str(d['approved']).lower())")
          if [ "$approved" != "true" ]; then
            echo "Reviewer blocked this PR:"
            cat .agent-bus/review.json
            exit 1
          fi
          echo "Reviewer approved"

  token-watcher-post:
    name: Token Watcher (post)
    needs: agent-reviewer
    if: vars.AGENTS_ENABLED == 'true'
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - run: ./scripts/run-agent.sh token-watcher post-review

  docs-dashboard:
    name: Update docs + index.html
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && vars.AGENTS_ENABLED == 'true'
    needs: token-watcher-post
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v4
        with: { token: '${{ secrets.GITHUB_TOKEN }}' }
      - name: Run Docs Agent
        run: ./scripts/run-agent.sh docs-dashboard
      - name: Run Layman Agent
        run: ./scripts/run-agent.sh layman
      - name: Commit updated docs and dashboard
        run: |
          git config user.name "camara-ca-docs-agent"
          git config user.email "agents@camara.dev"
          git add docs/ index.html
          git diff --staged --quiet || git commit -m "docs: auto-update dashboard and docs [skip ci]"
          git push
