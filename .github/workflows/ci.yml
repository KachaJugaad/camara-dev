name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install black ruff --quiet
      - run: black --check src/simulation/ tests/
      - run: ruff check src/simulation/ tests/

  unit-tests:
    name: Unit tests
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -r src/simulation/requirements.txt --quiet
      - run: pytest tests/unit/ -v

  integration-tests:
    name: Integration tests
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -r src/simulation/requirements.txt --quiet
      - run: pytest tests/integration/ -v

  docker-build:
    name: Docker build check
    needs: [unit-tests, integration-tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t camara-dev:ci -f src/simulation/Dockerfile .
