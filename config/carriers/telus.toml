# config/carriers/telus.toml
[carrier]
name        = "Telus"
country     = "CA"
mcc         = "302"
mnc         = "220"
msisdn_prefixes = [
  "1604", "1778",   # Vancouver / BC
  "1403", "1587",   # Calgary / Alberta
  "1780", "1825",   # Edmonton
  "1250",           # BC Interior
]

[latency_ms]
p50  = 105
p75  = 195
p95  = 295
p99  = 780
p999 = 2100

[error_profiles]
timeout_probability              = 0.028
service_unavailable_probability  = 0.007
invalid_token_probability        = 0.006
roaming_not_supported_probability = 0.019

[features]
sim_swap_supported              = true
device_location_supported       = true
number_verification_supported   = true
qos_profiles_supported          = false
quality_on_demand_supported     = false
edge_discovery_supported        = false

[ipv6]
dual_stack = true
ipv6_only_probability = 0.22

[sim_swap]
detection_delay_hours = 1
max_lookback_days     = 90
